name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout ComfyUI
        uses: actions/checkout@v4
        with:
          repository: comfyanonymous/ComfyUI
          path: ComfyUI

      - name: Install deps (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install einops safetensors transformers pillow numpy

      - name: Standalone tests
        run: |
          python test_server_routes.py
          python test_latent.py

      - name: Regional / bridge / builder tests
        env:
          COMFYUI_PATH: ${{ github.workspace }}/ComfyUI
        run: |
          python test_nodes.py
          python test_bridge.py
          python test_builder.py
